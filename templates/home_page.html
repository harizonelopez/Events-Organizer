<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Organizer App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>

    <!-- // Auto-hide flash messages function script -->
    <script>
        setTimeout(() => {
            const flashMessages = document.getElementById("flash-messages");
            if (flashMessages) {
                flashMessages.style.transition = "opacity 0.5s ease-out";
                flashMessages.style.opacity = 0; // Fade out
                setTimeout(() => flashMessages.remove(), 500); // Remove after fade-out
            }
        }, 3000); //  3 seconds timer for the flash messages to fade out
    </script>
    <script>
        function toggleEdit(taskId) {
            document.getElementById(`task-name-${taskId}`).style.display = 'none';
            document.getElementById(`edit-task-${taskId}`).style.display = 'inline-block';
            
            let form = document.querySelector(`#task-${taskId} .edit-form`);
            form.querySelector('.edit-btn').style.display = 'none';
            form.querySelector('.save-btn').style.display = 'inline-block';
        }
    </script>    
</head>
<body>
    <!--Flash Messages feature-->
    <div class="flash-messages">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div id="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
    </div>
    <div class="container">
        <h1><i>My To-Do Task List</i></h1>

        <!-- Form to add a new task -->
        <form action="{{ url_for('add_task') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="input-group">
                <input 
                    type="text" 
                    name="task_name" 
                    id="taskInput" 
                    placeholder="Add a new task here..!" required>
                <button type="submit" id="addTaskBtn">Add Task</button>
            </div>
        </form>
        
        <table id="taskTable">
            <thead>
                <tr>
                    <th id="task-th">Task</th>
                    <th>Status</th>
                    <th>Edit</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Tasks will be inserted here dynamically -->
                {% for task in tasks %}
                <tr id="task-{{ task.id }}">
                    <td>{{ task.name }}</td>
                    <td>
                        <form action="{{ url_for('update_task_status', task_id=task.id) }}" method="POST">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <select name="status" onchange="this.form.submit()">
                                <option value="Pending" {% if task.status == 'Pending' %} selected {% endif %}>Pending</option>
                                <option value="Completed" {% if task.status == 'Completed' %} selected {% endif %}>Completed</option>
                            </select>
                        </form>                        
                    </td>
                    <td><form action="{{ url_for('update_task_name', task_id=task.id) }}" method="POST" class="edit-form">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                <span class="task-name" id="task-name-{{ task.id }}">{{ task.name }}</span>
                            <input type="text" name="new_name" id="edit-task-{{ task.id }}" value="{{ task.name }}" class="edit-input" style="display: none;">
                            <button type="button" class="edit-btn" onclick="toggleEdit({{ task.id }})">Edit</button>
                            <button type="submit" class="save-btn" style="display: none;">Save</button>
                        </form>
                    </td>
                    <td>
                        <form action="{{ url_for('delete_task', task_id=task.id) }}" method="POST">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <input type="hidden" name="_method" value="DELETE"> 
                            <button class="btn btn-outline-primary">Delete</button>
                        </form>  
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>

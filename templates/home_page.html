<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Organizer App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>

    <!--Flash Messages feature-->
    <div class="flash-messages">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div id="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
    </div>

    <!-- // Auto-hide flash messages function script -->
    <script>
        setTimeout(() => {
            const flashMessages = document.getElementById("flash-messages");
            if (flashMessages) {
                flashMessages.style.transition = "opacity 0.5s ease-out";
                flashMessages.style.opacity = 0; // Fade out
                setTimeout(() => flashMessages.remove(), 500); // Remove after fade-out
            }
        }, 3000); //  3 seconds timer for the flash messages to fade out
    </script>
</head>
<body>
    <div class="container">
        <h1><i>My To-Do Task List</i></h1>

        <!-- Form to add a new task -->
        <form action="{{ url_for('add_task') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="input-group">
                <input 
                    type="text" 
                    name="task_name" 
                    id="taskInput" 
                    placeholder="Add a new task here..!" required>
                <button type="submit" id="addTaskBtn">Add Task</button>
            </div>
        </form>
        
        <table id="taskTable">
            <thead>
                <tr>
                    <th id="task-th">Task</th>
                    <th>Status</th>
                    <th>Edit</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Tasks will be inserted here dynamically -->
                {% for task in tasks %}
                <tr id="task-{{ task.id }}">
                    <td>{{ task.name }}</td>
                    <td>
                        <select onchange="updateTaskStatus({{ task.id }}, this.value)">
                            <option value="pending" {% if task.status == 'pending' %} selected {% endif %}>Pending</option>
                            <option value="completed" {% if task.status == 'completed' %} selected {% endif %}>Completed</option>
                        </select>
                    </td>
                    <td><button type="submit" class="btn btn-outline-success">Edit</button></td>
                    <td>
                        <form action="{{ url_for('delete_task', task_id=task.id) }}" method="POST">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <input type="hidden" name="_method" value="DELETE"> 
                            <button class="btn btn-outline-primary">Delete</button>
                        </form>  
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
